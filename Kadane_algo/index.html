<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        
function maxSubarraySum(nums) {
    // Проверка на пустой массив
    if (!nums || nums.length === 0) {
        return 0;
    }
    
    // Текущая сумма подмассива, заканчивающегося в текущей позиции
    let currentSum = nums[0];
    // Глобальная максимальная сумма
    let maxSum = nums[0];
    
    for (let i = 1; i < nums.length; i++) {
        // Либо начинаем новый подмассив с nums[i],
        // либо добавляем nums[i] к текущему подмассиву
        currentSum = Math.max(nums[i], currentSum + nums[i]);
        // Обновляем глобальный максимум
        maxSum = Math.max(maxSum, currentSum);
    }
    
    return maxSum;
}

// Пример
const nums = [-2, 1, -3, 4, -1, 2, 1, -5, 4];
const result = maxSubarraySum(nums);
console.log(`Максимальная сумма подмассива: ${result}`);

    </script>
</body>
</html>

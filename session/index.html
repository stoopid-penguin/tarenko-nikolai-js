<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Создание поста</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        /* Карточка формы */
        .form-container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            max-width: 500px;
            width: 100%;
            animation: fadeIn 0.5s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Заголовок */
        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 28px;
            text-align: center;
        }

        .subtitle {
            color: #666;
            text-align: center;
            margin-bottom: 30px;
            font-size: 14px;
        }

        /* Поля ввода */
        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 500;
            font-size: 14px;
        }

        input, textarea {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 15px;
            transition: all 0.3s ease;
            font-family: inherit;
        }

        input:focus, textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        textarea {
            resize: vertical;
            min-height: 120px;
        }

        /* Кнопка (увеличение при наведении) */
        .submit-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .submit-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .submit-btn:active {
            transform: scale(0.98);
        }

        /* Блок с результатом */
        .result {
            margin-top: 25px;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 12px;
            display: none;
            animation: slideUp 0.3s ease-out;
        }

        .result.show {
            display: block;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .result h3 {
            color: #28a745;
            margin-bottom: 10px;
            font-size: 18px;
        }

        .result h4 {
            color: #333;
            margin: 10px 0 5px;
            font-size: 14px;
        }

        .result p {
            color: #555;
            line-height: 1.5;
            font-size: 14px;
        }

        .result .post-id {
            color: #667eea;
            font-weight: bold;
        }

        /* Индикатор загрузки */
        .loading {
            display: none;
            text-align: center;
            margin-top: 20px;
            color: #667eea;
        }

        .loading.show {
            display: block;
        }

        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Адаптивность */
        @media (max-width: 600px) {
            .form-container {
                padding: 25px;
            }
            
            h1 {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>
    <div class="form-container">
        <h1> Создать пост</h1>

        <form id="postForm">
            <div class="form-group">
                <label>Заголовок</label>
                <input 
                    type="text" 
                    id="title" 
                    required
                    autocomplete="off"
                >
            </div>

            <div class="form-group">
                <label>Текст поста</label>
                <textarea 
                    id="body" 
                    required
                >
                </textarea>
            </div>

            <button type="submit" class="submit-btn">Отправить</button>
        </form>

        <div class="loading" id="loading">
            <div class="spinner"></div> Отправка...
        </div>

        <div class="result" id="result"></div>
    </div>

    <script>
        // находим наши элементы
        const form = document.getElementById('postForm');
        const resultDiv = document.getElementById('result');
        const loadingDiv = document.getElementById('loading');

        // создаем обработчик отправки POST-запроса
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            // получаем данные из формы
            const title = document.getElementById('title').value;
            const body = document.getElementById('body').value;
            
            // формируем объект поста
            const newPost = {
                title: title,
                body: body,
                userId: 1
            };

            // показываем индикатор загрузки
            loadingDiv.classList.add('show');
            resultDiv.classList.remove('show');
            
            try {
                // отправляем POST-запрос
                const response = await fetch('https://jsonplaceholder.typicode.com/posts', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(newPost)
                });

                const data = await response.json();
                
                // Отображаем отправленный пост и результат запроса
                resultDiv.innerHTML = `
                    <h3>✅ Пост успешно создан!</h3>
                    <p><span class="post-id">ID: ${data.id}</span></p>
                    <h4>📌 Заголовок:</h4>
                    <p><strong>${escapeHtml(data.title)}</strong></p>
                    <h4>📄 Текст:</h4>
                    <p>${escapeHtml(data.body)}</p>
                `;
                resultDiv.classList.add('show');
                
                // очищаем форму
                form.reset();
            
            // для ошибок
            } catch (error) {
                resultDiv.innerHTML = `
                    <h3 style="color: #dc3545;">❌ Ошибка</h3>
                    <p>Не удалось создать пост. Попробуйте ещё раз.</p>
                `;
                resultDiv.classList.add('show');
            } finally {
                // скрываем индикатор загрузки (это из верстки)
                loadingDiv.classList.remove('show');
            }
        });
    </script>
</body>
</html>

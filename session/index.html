<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Создание поста + список</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .form-container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            max-width: 600px;
            width: 100%;
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 28px;
            text-align: center;
        }

        .subtitle {
            color: #666;
            text-align: center;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 500;
            font-size: 14px;
        }

        input, textarea {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 15px;
            transition: all 0.3s ease;
            font-family: inherit;
        }

        input:focus, textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        textarea {
            resize: vertical;
            min-height: 120px;
        }

        .submit-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .submit-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .submit-btn:active {
            transform: scale(0.98);
        }

        .result {
            margin-top: 25px;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 12px;
            display: none;
        }

        .result.show {
            display: block;
        }

        .result h3 {
            color: #28a745;
            margin-bottom: 10px;
            font-size: 18px;
        }

        .result .post-id {
            color: #667eea;
            font-weight: bold;
        }

        .loading {
            display: none;
            text-align: center;
            margin-top: 20px;
            color: #667eea;
        }

        .loading.show {
            display: block;
        }

        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Стили для списка постов */
        .posts-section {
            margin-top: 30px;
            border-top: 1px solid #e0e0e0;
            padding-top: 25px;
        }

        .posts-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            flex-wrap: wrap;
            gap: 10px;
        }

        .posts-header h3 {
            color: #333;
            font-size: 18px;
        }

        .refresh-btn {
            background: #667eea;
            color: white;
            border: none;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 12px;
            cursor: pointer;
        }

        .posts-list {
            max-height: 400px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .post-item {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 12px;
            border-left: 3px solid #667eea;
        }

        .post-item strong {
            color: #333;
            display: block;
            margin-bottom: 6px;
        }

        .post-item small {
            color: #667eea;
            font-size: 11px;
        }

        .post-item p {
            color: #555;
            font-size: 13px;
            margin-top: 6px;
            line-height: 1.4;
        }

        .empty-posts {
            text-align: center;
            color: #999;
            padding: 30px;
            font-size: 14px;
        }

        @media (max-width: 600px) {
            .form-container {
                padding: 25px;
            }
            h1 {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>
    <div class="form-container">
        <h1>📝 Создать пост</h1>
        <div class="subtitle">Заполните форму — пост появится в ленте</div>

        <form id="postForm">
            <div class="form-group">
                <label>Заголовок</label>
                <input type="text" id="title" required autocomplete="off">
            </div>
            <div class="form-group">
                <label>Текст поста</label>
                <textarea id="body" required></textarea>
            </div>
            <button type="submit" class="submit-btn">Отправить</button>
        </form>

        <div class="loading" id="loading">
            <div class="spinner"></div> Отправка...
        </div>

        <div class="result" id="result"></div>

        <!-- Блок со списком постов -->
        <div class="posts-section">
            <div class="posts-header">
                <h3>📋 Все посты</h3>
                <button class="refresh-btn" id="refreshBtn">Обновить</button>
            </div>
            <div id="postsList" class="posts-list">
                <div class="empty-posts">Загрузка...</div>
            </div>
        </div>
    </div>

    <script>
        // находим наши элементы
        const form = document.getElementById('postForm');
        const resultDiv = document.getElementById('result');
        const loadingDiv = document.getElementById('loading');
        const postsList = document.getElementById('postsList');
        const refreshBtn = document.getElementById('refreshBtn');

        // экранирование 
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }

        // загрузка и отображение постов
        async function loadPosts() {
            postsList.innerHTML = '<div class="empty-posts">Загрузка</div>';
            try {
                const res = await fetch('https://jsonplaceholder.typicode.com/posts?_limit=10');
                const posts = await res.json();
                if (posts.length === 0) {
                    postsList.innerHTML = '<div class="empty-posts">Нет постов</div>';
                    return;
                }
                let html = '';
                for (let p of posts) {
                    html += `
                        <div class="post-item">
                            <strong>${escapeHtml(p.title)}</strong>
                            <small>ID: ${p.id}</small>
                            <p>${escapeHtml(p.body.length > 100 ? p.body.slice(0, 100) + '...' : p.body)}</p>
                        </div>
                    `;
                }
                postsList.innerHTML = html;
            } catch (err) {
                postsList.innerHTML = '<div class="empty-posts">Ошибка загрузки</div>';
            }
        }

        // создаем обработчик отправки POST-запроса
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            // получаем данные из формы
            const title = document.getElementById('title').value;
            const body = document.getElementById('body').value;
    
            
            try {
                // отправляем POST-запрос
                const response = await fetch('https://jsonplaceholder.typicode.com/posts', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ title, body, userId: 1 })
                });

                const data = await response.json();
                
                // Отображаем отправленный пост и результат запроса
                resultDiv.innerHTML = `
                    <h3>✅ Пост успешно создан!</h3>
                    <p><span class="post-id">ID: ${data.id}</span></p>
                    <h4>📌 Заголовок:</h4>
                    <p><strong>${escapeHtml(data.title)}</strong></p>
                    <h4>📄 Текст:</h4>
                    <p>${escapeHtml(data.body)}</p>
                `;
                resultDiv.classList.add('show');
                
                // очищаем форму
                form.reset();
            

                // обновляем список постов
                await loadPosts();
            } catch (error) {resultDiv.innerHTML = `
                    <h3 style="color: #dc3545;">❌ Ошибка</h3>
                    <p>Не удалось создать пост. Попробуйте ещё раз.</p>
                `;
                resultDiv.classList.add('show');
            } finally {
                // скрываем индикатор загрузки (это из верстки)
                loadingDiv.classList.remove('show');
            }
        });

        // обновление по кнопке
        refreshBtn.addEventListener('click', loadPosts);

        // загружаем посты при старте
        loadPosts();

    </script>
</body>
</html>
